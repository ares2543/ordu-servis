<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ordu Servis Talep Sistemi</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
  </head>
  <body>
    <header>
      <h1>Ordu Öğrenci Servis Yönetimi</h1>
      <p>Talep oluşturma, servisçi kayıt, teklif seçimi ve canlı takip.</p>
    </header>

    <nav class="tabs">
      <button class="tab-button active" data-tab="request">Talep Formu</button>
      <button class="tab-button" data-tab="driver">Servisçi Girişi</button>
    </nav>

    <main>
      <section id="request" class="tab active">
        <h2>Talep Formu</h2>
        <form id="requestForm">
          <div class="grid">
            <label>Ad <input name="firstName" required /></label>
            <label>Soyad <input name="lastName" required /></label>
            <label>Telefon <input name="phone" placeholder="05xx xxx xx xx" required /></label>
            <label>İlçe
              <select name="district" id="districtSelect" required></select>
            </label>
            <label>Okul
              <input name="school" id="schoolInput" list="schoolOptions" placeholder="Okul adını yazın veya listeden seçin" required />
              <datalist id="schoolOptions"></datalist>
            </label>
            <label>Ev Adresi <input name="homeAddress" required /></label>
            <label>Gidiş Noktası <input name="fromAddress" required /></label>
            <label>Varış Noktası <input name="toAddress" required /></label>
          </div>
          <div class="row">
            <button type="button" id="sendOtpBtn">Telefona Doğrulama Kodu Gönder</button>
            <label>Doğrulama Kodu <input name="otp" id="otpInput" required /></label>
          </div>
          <button type="submit">Talebi Gönder</button>
        </form>
        <p id="requestStatus" class="status"></p>

        <h3>Müşteri Teklif ve Takip Bölümü</h3>
        <form id="offersLookupForm">
          <div class="grid">
            <label>Talep ID <input name="requestId" required /></label>
            <label>Telefon <input name="phone" required /></label>
          </div>
          <div class="row">
            <button type="submit">Teklifleri Göster</button>
            <button type="button" id="startTrackingBtn">Leaflet ile Servisi Takip Et</button>
          </div>
        </form>
        <p id="offersStatus" class="status"></p>
        <p id="trackingInfo" class="status"></p>
        <div class="row"><button type="button" id="advanceTrackingBtn">Servis Konumunu Güncelle</button></div>
        <div id="offersList"></div>
        <div id="customerMap"></div>
      </section>

      <section id="driver" class="tab">
        <h2>Servisçi Girişi</h2>
        <form id="driverForm">
          <div class="grid">
            <label>Ad Soyad <input name="name" required /></label>
            <label>Telefon <input name="phone" required /></label>
            <label>Araç Plakası <input name="plate" required /></label>
            <label>Hizmet İlçesi
              <select name="district" id="driverDistrictSelect" required></select>
            </label>
            <label>Okul/hat bilgisi <input name="schoolCoverage" required /></label>
            <label>Servis Ücreti (₺) <input name="fee" type="number" min="0" step="0.01" required /></label>
          </div>
          <div class="row">
            <button type="button" id="sendDriverOtpBtn">Telefona Doğrulama Kodu Gönder</button>
            <label>Doğrulama Kodu <input name="otp" id="driverOtpInput" required /></label>
          </div>
          <div class="row">
            <button type="submit">Kayıt Ol</button>
            <button type="button" id="startDriverLiveBtn">Canlı Konum Paylaşımı Başlat</button>
          </div>
        </form>
        <p id="driverStatus" class="status"></p>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="schools-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
